<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Windy Map Test</title>
    <style>
      html,
      body,
      #windy {
        width: 100%;
        height: 100%;
        margin: 0;
      }

      #status {
        position: fixed;
        z-index: 10000;
        top: 12px;
        left: 12px;
        max-width: calc(100% - 24px);
        padding: 8px 10px;
        border-radius: 6px;
        color: #17202a;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 2px 12px rgba(0, 0, 0, 0.16);
        font-family: Arial, Helvetica, sans-serif;
        font-size: 13px;
      }
    </style>
  </head>
  <body>
    <div id="windy"></div>
    <div id="status">Loading Windy test...</div>

    <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
    <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
    <script>
      const statusEl = document.querySelector("#status");

      function setStatus(message) {
        statusEl.textContent = message;
      }

      window.addEventListener("error", (event) => {
        setStatus(`Browser error: ${event.message}`);
      });

      window.addEventListener("unhandledrejection", (event) => {
        const reason = event.reason?.message || String(event.reason);
        setStatus(`Browser error: ${reason}`);
      });

      async function init() {
        const response = await fetch("/api/config");
        const config = await response.json();

        if (!config.has_windy_map_api_key) {
          setStatus("WINDY_MAP_API_KEY is missing.");
          return;
        }
        if (typeof windyInit !== "function") {
          setStatus("Windy libBoot.js did not load.");
          return;
        }

        const timeout = window.setTimeout(() => {
          setStatus("Windy callback timeout. Check Map API key domain/settings.");
        }, 8000);

        windyInit(
          {
            key: config.windy_api_key,
            lat: 23.7,
            lon: 121.0,
            zoom: 7,
            overlay: "wind",
            verbose: true,
          },
          (windyAPI) => {
            window.clearTimeout(timeout);
            windyAPI.map.invalidateSize();
            windyAPI.store.set("overlay", "wind");
            setStatus(`Windy initialized. Active layer: ${windyAPI.store.get("overlay")}`);
          }
        );
      }

      init().catch((error) => setStatus(`Init error: ${error.message}`));
    </script>
  </body>
</html>
