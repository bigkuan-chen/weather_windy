<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>CWA Temperature Broadcast</title>
    <link rel="stylesheet" href="/assets/styles.css?v=windy-fullscreen-1" />
  </head>
  <body>
    <header class="topbar">
      <div>
        <h1>CWA Temperature Broadcast</h1>
        <p id="status">Loading station observations...</p>
      </div>
      <button id="refreshButton" type="button">Refresh</button>
    </header>

    <main class="app-shell">
      <section id="mapShell">
        <div id="windy"></div>
        <div id="mapStatus">Initializing map...</div>
        <div id="mapFallback" hidden>
          <div id="fallbackMap"></div>
          <div id="fallbackNote" class="fallback-note">Showing fallback map.</div>
        </div>
      </section>

      <aside class="panel">
        <section>
          <h2>Layers</h2>
          <label>
            Windy layer
            <select id="overlaySelect">
              <option value="wind">Wind</option>
              <option value="temp">Temperature</option>
              <option value="rain">Rain</option>
              <option value="clouds">Clouds</option>
            </select>
          </label>
          <label class="check">
            <input id="cwaToggle" type="checkbox" checked />
            CWA observations
          </label>
          <label class="check">
            <input id="labelToggle" type="checkbox" />
            Station labels
          </label>
          <label class="check">
            <input id="pointForecastToggle" type="checkbox" />
            Windy point forecast
          </label>
        </section>

        <section>
          <h2>Filters</h2>
          <label>
            County
            <select id="countySelect">
              <option value="">All counties</option>
            </select>
          </label>
          <label>
            Minimum temperature
            <input id="thresholdInput" type="number" min="-20" max="50" step="1" />
          </label>
        </section>

        <section>
          <h2>Legend</h2>
          <div id="legend"></div>
        </section>

        <section>
          <h2>Stations</h2>
          <div id="stationList"></div>
        </section>
      </aside>
    </main>

    <script src="https://unpkg.com/leaflet@1.4.0/dist/leaflet.js"></script>
    <script src="https://api.windy.com/assets/map-forecast/libBoot.js"></script>
    <script src="/assets/app.js?v=windy-fullscreen-1"></script>
  </body>
</html>
